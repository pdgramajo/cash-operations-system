services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cash-operations-system

    ports:
      - "5173:5173"

    volumes:
      - .:/app
      - cash_operations_node_modules:/app/node_modules
      - cash_operations_pnpm_store:/pnpm/store

    environment:
      - CHOKIDAR_USEPOLLING=true

    tty: true
    stdin_open: true

    command: sh -c "pnpm install --config.confirmModulesPurge=false && pnpm dev --host 0.0.0.0"

volumes:
  cash_operations_node_modules:
  cash_operations_pnpm_store: