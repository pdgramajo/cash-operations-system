services:
  app:
    container_name: cash-operations-system
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - cash-operations-system_node_modules:/app/node_modules
      - cash-operations-system_pnpm_store:/root/.local/share/pnpm
    environment:
      CHOKIDAR_USEPOLLING: "true"
    restart: unless-stopped

volumes:
  cash-operations-system_node_modules:
    name: cash-operations-system_node_modules

  cash-operations-system_pnpm_store:
    name: cash-operations-system_pnpm_store